services:
  postgres:
    image: postgres:16-alpine
    container_name: learngo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: learngo
      POSTGRES_PASSWORD: learngo_password
      POSTGRES_DB: learngo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learngo -d learngo"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: learngo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: learngo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: learngo
      RABBITMQ_DEFAULT_PASS: learngo_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
